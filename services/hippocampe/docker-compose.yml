version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: aletheia
      POSTGRES_PASSWORD: aletheia_password
      POSTGRES_DB: hippocampe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
